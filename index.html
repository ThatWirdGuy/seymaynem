<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Online Cars</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; color: white; font-family: sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
    #bar-bg { width: 300px; height: 20px; background: #333; border-radius: 10px; margin-top: 10px; }
    #bar { height: 20px; background: #0f0; border-radius: 10px; width: 0%; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="loading">
    <div id="status">Loading game data...</div>
    <div id="bar-bg"><div id="bar"></div></div>
  </div>
  <canvas id="unity-canvas" style="display:none;"></canvas>

  <script src="Build/Driver Online Cars.loader.js"></script>
  <script>
    // ---- Yandex SDK Stub ----
    var myGameInstance = null;

    var ysdk = {
      environment: {
        i18n: { lang: 'en', tld: 'com' },
        app: { id: '0' },
        browser: { lang: 'en' },
        payload: null
      },
      deviceInfo: {
        type: 'desktop',
        isMobile: () => false,
        isDesktop: () => true,
        isTablet: () => false,
        isTV: () => false
      },
      screen: {
        fullscreen: {
          status: 'off',
          request: () => {}
        }
      },
      adv: {
        showFullscreenAdv: ({ callbacks }) => {
          if (callbacks && callbacks.onClose) callbacks.onClose(false);
        },
        showRewardedVideo: ({ callbacks }) => {
          if (callbacks && callbacks.onClose) callbacks.onClose();
        },
        showBannerAdv: () => {},
        hideBannerAdv: () => {},
        getBannerAdvStatus: () => Promise.resolve({ stickyAdvIsShowing: false })
      },
      auth: {
        openAuthDialog: () => Promise.resolve()
      },
      feedback: {
        canReview: () => Promise.resolve({ value: false }),
        requestReview: () => Promise.resolve({ feedbackSent: false })
      },
      shortcut: {
        canShowPrompt: () => Promise.resolve({ canShow: false }),
        showPrompt: () => Promise.resolve({ outcome: 'rejected' })
      },
      getPlayer: () => Promise.resolve({
        getName: () => 'Guest',
        getPhoto: () => '',
        getUniqueID: () => 'guest_001',
        getMode: () => 'lite',
        getPayingStatus: () => 'non_paying',
        getData: () => Promise.resolve({}),
        setData: () => Promise.resolve(),
        scopePermissions: { public_name: 'deny' }
      }),
      getPayments: () => Promise.reject(new Error('Payments not available')),
      getLeaderboards: () => Promise.resolve({
        getLeaderboardDescription: (name) => Promise.resolve({
          default: true,
          description: {
            invert_sort_order: false,
            score_format: { options: { decimal_offset: 0 } },
            type: 'numeric'
          }
        }),
        getLeaderboardEntries: () => Promise.resolve({ entries: [] }),
        setLeaderboardScore: () => Promise.resolve()
      })
    };

    var environmentData = JSON.stringify({
      "language": "en",
      "domain": "com",
      "deviceType": "desktop",
      "isMobile": false,
      "isDesktop": true,
      "isTablet": false,
      "isTV": false,
      "appID": "0",
      "browserLang": "en",
      "payload": null,
      "promptCanShow": false,
      "reviewCanShow": false,
      "platform": navigator.platform,
      "browser": "Chrome"
    });

    var playerData = JSON.stringify({
      "playerAuth": "rejected",
      "playerName": "Guest",
      "playerId": "guest_001",
      "playerPhoto": "",
      "payingStatus": "non_paying"
    });

    var cloudSaves = 'noData';
    var paymentsData = 'none';
    var leaderboard = null;

    function InitGame() {
      console.log('InitGame called');
    }

    function FullAdShow() {
      console.log('FullAdShow stub');
      if (myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'CloseFullAd', 'false');
      }
    }

    function RewardedShow(id) {
      console.log('RewardedShow stub', id);
      if (myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'CloseVideo');
      }
    }

    function StickyAdActivity(show) {
      console.log('StickyAdActivity stub', show);
    }

    function Review() {
      console.log('Review stub');
      if (myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'ReviewSent', 'false');
      }
    }

    function PromptShow() {
      console.log('PromptShow stub');
      if (myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'OnPromptFail');
      }
    }

    function SaveCloud(jsonData, flush) {
      console.log('SaveCloud stub');
      try { localStorage.setItem('cloudSave', jsonData); } catch(e) {}
    }

    function LoadCloud(sendback) {
      var data = 'noData';
      try { data = localStorage.getItem('cloudSave') || 'noData'; } catch(e) {}
      if (sendback && myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', data);
      }
      return Promise.resolve(data);
    }

    function GetPayments(sendback) {
      if (sendback && myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'PaymentsEntries', 'none');
      }
      return Promise.resolve('none');
    }

    function BuyPayments(id) {
      console.log('BuyPayments stub', id);
      if (myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'OnPurchaseFailed', id);
      }
    }

    function ConsumePurchase(id) {
      console.log('ConsumePurchase stub', id);
    }

    function ConsumePurchases() {
      console.log('ConsumePurchases stub');
    }

    function InitLeaderboards() {
      console.log('InitLeaderboards stub');
      leaderboard = true;
    }

    function WaitForLeaderboard() {
      return Promise.resolve();
    }

    function GetLeaderboardScores(nameLB, maxPlayers, quantityTop, quantityAround, photoSize, auth) {
      console.log('GetLeaderboardScores stub');
      if (myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'LeaderboardEntries', JSON.stringify({
          technoName: nameLB,
          isDefault: true,
          isInvertSortOrder: false,
          decimalOffset: 0,
          type: 'numeric',
          entries: 'no data',
          ranks: [],
          photos: [],
          names: [],
          scores: [],
          uniqueIDs: []
        }));
      }
    }

    function SetLeaderboardScores(name, score) {
      console.log('SetLeaderboardScores stub', name, score);
    }

    function OpenAuthDialog() {
      console.log('OpenAuthDialog stub');
    }

    function RequestingEnvironmentData(sendback) {
      if (sendback && myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'SetEnvirData', environmentData);
      }
      return Promise.resolve(environmentData);
    }

    function InitPlayer(sendback) {
      if (sendback && myGameInstance) {
        myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', playerData);
      }
      return Promise.resolve(playerData);
    }

    function NotAuthorized() {
      return playerData;
    }

    function FocusGame() {
      window.focus();
      var canvas = document.querySelector('#unity-canvas');
      if (canvas) canvas.focus();
    }

    // ---- Load & Start ----
    const parts = [
      "Build/Driver Online Cars.data.part000.unityweb",
      "Build/Driver Online Cars.data.part001.unityweb",
      "Build/Driver Online Cars.data.part002.unityweb",
      "Build/Driver Online Cars.data.part003.unityweb",
      "Build/Driver Online Cars.data.part004.unityweb",
      "Build/Driver Online Cars.data.part005.unityweb",
      "Build/Driver Online Cars.data.part006.unityweb",
      "Build/Driver Online Cars.data.part007.unityweb",
    ];

    async function fetchPart(url, index) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Failed to fetch ${url}: ${res.status}`);
      document.getElementById('status').textContent = `Loading part ${index + 1} of ${parts.length}...`;
      document.getElementById('bar').style.width = `${((index + 1) / parts.length) * 100}%`;
      return res.arrayBuffer();
    }

    async function loadAndStart() {
      try {
        const buffers = [];
        for (let i = 0; i < parts.length; i++) {
          buffers.push(await fetchPart(parts[i], i));
        }

        document.getElementById('status').textContent = 'Assembling data...';
        const totalLength = buffers.reduce((sum, b) => sum + b.byteLength, 0);
        const combined = new Uint8Array(totalLength);
        let offset = 0;
        for (const buf of buffers) {
          combined.set(new Uint8Array(buf), offset);
          offset += buf.byteLength;
        }

        const blob = new Blob([combined], { type: 'application/octet-stream' });
        const dataUrl = URL.createObjectURL(blob);

        document.getElementById('status').textContent = 'Starting game...';

        document.getElementById('loading').style.display = 'none';
        document.getElementById('unity-canvas').style.display = 'block';

        myGameInstance = await createUnityInstance(document.querySelector("#unity-canvas"), {
          dataUrl: dataUrl,
          frameworkUrl: "Build/Driver Online Cars.framework.js.unityweb",
          codeUrl: "Build/Driver Online Cars.wasm.unityweb",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "VayGame",
          productName: "Driver Online Cars",
          productVersion: "1.1.0.0",
        });

        myGameInstance.SendMessage('YandexGame', 'SetEnvirData', environmentData);
        myGameInstance.SendMessage('YandexGame', 'SetInitializationSDK', playerData);
        myGameInstance.SendMessage('YandexGame', 'SetLoadSaves', cloudSaves);

      } catch (e) {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('status').textContent = 'Error: ' + e.message;
        console.error(e);
      }
    }

    window.addEventListener('pointerdown', FocusGame);
    window.addEventListener('touchstart', FocusGame);
    document.addEventListener('contextmenu', e => e.preventDefault());

    loadAndStart();
  </script>
</body>
</html>
